<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="version" content="1776666302">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jobs Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:        #dce5ef;
    --bg2:       #e8eef5;
    --surface:   #f0f4f8;
    --white:     #ffffff;
    --border:    #c8d4e0;
    --border2:   #d8e2ec;
    --text:      #0f1a20;
    --text2:     #1e3040;
    --text3:     #5a6a7a;
    --accent:    #2e6da4;
    --accent2:   #1a4f7a;
    --green:     #2a7a56;
    --green-bg:  #e8f5ee;
    --green-bd:  #b8deca;
    --orange:    #b56020;
    --font:      'JetBrains Mono', 'Courier New', monospace;
    --font-head: 'Space Grotesk', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }
  input, textarea { background: transparent; border: none; outline: none; color: var(--text); font-family: var(--font); width: 100%; resize: none; }
  input::placeholder, textarea::placeholder { color: var(--border); }
  input:disabled { opacity: 0.25; }
  button { cursor: pointer; font-family: var(--font); }
  ::-webkit-scrollbar { height: 5px; width: 5px; background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Header ── */
  #header {
    background: var(--white); border-bottom: 1px solid var(--border);
    padding: 16px 28px; display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px; position: sticky; top: 0; z-index: 10;
    box-shadow: 0 1px 6px rgba(30,60,100,0.07);
  }
  #header h1 { font-family: var(--font-head); font-size: 21px; font-weight: 800; letter-spacing: -0.5px; color: var(--text); }
  #header h1 span { color: var(--accent); }
  #week-label { font-size: 10px; color: var(--text2); letter-spacing: 0.07em; font-weight: 500; }
  .tab-btn {
    padding: 6px 18px; border-radius: 5px; border: 1px solid var(--border2);
    background: var(--surface); color: var(--text2); font-size: 10px; letter-spacing: 0.08em;
    text-transform: uppercase; transition: all 0.15s;
  }
  .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  #new-week-btn {
    background: var(--accent); border: 1px solid var(--accent2); color: #fff;
    font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 4px 10px; border-radius: 4px; cursor: pointer;
    font-family: var(--font); font-weight: 600;
    box-shadow: 0 1px 4px rgba(46,109,164,0.2); transition: all 0.15s;
  }
  #new-week-btn:hover { background: var(--accent2); }

  /* ── Main table ── */
  #jobs-wrap { padding: 20px 28px; overflow-x: auto; }
  #jobs-table {
    border-collapse: collapse; min-width: 980px; width: 100%;
    background: var(--white); border-radius: 10px; overflow: hidden;
    box-shadow: 0 2px 8px rgba(30,60,100,0.09);
  }
  #jobs-table thead tr { background: var(--surface); border-bottom: 2px solid var(--border); }
  #jobs-table th {
    padding: 9px 6px 11px; color: var(--text2); font-size: 9px; letter-spacing: 0.12em;
    font-weight: 700; text-align: center; border-left: 1px solid var(--border2);
    text-transform: uppercase;
  }
  #jobs-table th:first-child { text-align: left; padding-left: 14px; border-left: none; }
  #jobs-table th:last-child  { text-align: right; padding-right: 14px; }
  .th-day-total { font-family: var(--font-head); font-size: 13px; font-weight: 700; margin-bottom: 2px; color: var(--border); }
  .th-day-total.has-hours { color: var(--accent); }

  /* ── Job rows ── */
  .job-row { border-top: 1px solid var(--border2); }
  .job-cell { padding: 8px 14px; vertical-align: top; background: var(--surface); min-width: 160px; }
  .job-inner { display: flex; align-items: flex-start; gap: 8px; }
  .job-bar { width: 3px; min-height: 50px; border-radius: 2px; flex-shrink: 0; margin-top: 2px; }
  .job-fields { flex: 1; min-width: 0; }
  .job-name-input { font-size: 13px; font-weight: 700; color: var(--text); width: 100%; }
  .job-rate-row { display: flex; align-items: center; gap: 3px; margin-top: 4px; }
  .rate-sym { color: var(--text3); font-size: 10px; flex-shrink: 0; }
  .rate-input { font-size: 11px; font-weight: 600; width: 42px; border-bottom: 1px solid var(--border2); }
  .remove-btn { background: none; border: none; color: var(--border); font-size: 18px; padding: 0 3px; line-height: 1; margin-top: 2px; }
  .remove-btn:hover { color: #c0362a; }

  /* ── Day cells ── */
  .day-cell { padding: 4px; vertical-align: top; border-left: 1px solid var(--border2); min-width: 160px; }
  .day-inner {
    border: 1px solid var(--border2); border-radius: 6px; padding: 7px 9px; min-height: 100px;
    background: var(--white); position: relative;
  }
  .day-inner.has-data { background: var(--surface); }

  /* Worker entries inside a day cell */
  .worker-list { margin-bottom: 6px; }
  .worker-entry {
    border-bottom: 1px dashed var(--border2); padding-bottom: 5px; margin-bottom: 5px;
  }
  .worker-entry:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
  .worker-name-row { display: flex; align-items: center; gap: 4px; margin-bottom: 2px; }
  .worker-name-inp {
    font-size: 10px; font-weight: 600; color: var(--text); border-bottom: 1px solid transparent;
    transition: border-color 0.1s; flex: 1;
  }
  .worker-name-inp:focus { border-bottom-color: var(--accent); }
  .worker-name-inp::placeholder { color: var(--border); font-weight: 400; }
  .worker-times-row { display: flex; align-items: center; gap: 4px; margin-bottom: 1px; }
  .wt-sym { font-size: 7px; color: var(--border); flex-shrink: 0; }
  .worker-time-inp {
    font-size: 10px; color: var(--text2); font-weight: 500; border-bottom: 1px solid transparent;
    transition: border-color 0.1s;
  }
  .worker-time-inp:focus { border-bottom-color: var(--accent); }
  .worker-time-inp.filled { color: var(--text); font-weight: 600; }
  .worker-time-inp.error { color: #c0362a !important; }
  .worker-hrs-badge {
    font-family: var(--font-head); font-size: 11px; font-weight: 700;
    color: var(--border); white-space: nowrap;
  }
  .worker-hrs-badge.has-hrs { color: var(--accent); }
  .del-worker-btn {
    background: none; border: none; color: var(--border); font-size: 12px;
    padding: 0; line-height: 1; flex-shrink: 0;
  }
  .del-worker-btn:hover { color: #c0362a; }

  /* Cell footer — totals + add worker + parking/materials */
  .cell-footer { border-top: 1px solid var(--border2); margin-top: 5px; padding-top: 5px; }
  .cell-total-hrs {
    font-family: var(--font-head); font-size: 13px; font-weight: 800;
    color: var(--accent); margin-bottom: 4px;
  }
  .cell-extra-row { display: flex; align-items: center; gap: 3px; margin-bottom: 2px; }
  .cell-extra-lbl { font-size: 8px; color: var(--text3); flex-shrink: 0; width: 16px; letter-spacing: 0.05em; text-transform: uppercase; }
  .cell-extra-sym { font-size: 9px; color: var(--text3); flex-shrink: 0; }
  .cell-extra-inp { font-size: 10px; color: var(--text2); font-weight: 500; }
  .cell-extra-inp.filled { color: var(--text); font-weight: 600; }
  .add-worker-btn {
    display: block; width: 100%; margin-top: 5px; padding: 3px 0;
    background: none; border: 1px dashed var(--border2); border-radius: 3px;
    font-size: 8px; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase;
    cursor: pointer; transition: all 0.12s;
  }
  .add-worker-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Total cell ── */
  .total-cell { text-align: right; padding: 8px 14px 8px 10px; vertical-align: top; background: var(--surface); min-width: 110px; }
  .total-hrs-lbl { font-size: 13px; font-weight: 700; white-space: nowrap; }
  .total-wages-lbl { font-size: 10px; color: var(--text2); margin-top: 3px; font-weight: 500; }
  .total-extras-lbl { font-size: 10px; color: var(--green); margin-top: 2px; font-weight: 600; }
  .total-grand-lbl { font-family: var(--font-head); font-size: 14px; font-weight: 800; color: var(--text); margin-top: 6px; padding-top: 6px; border-top: 2px solid var(--border); white-space: nowrap; }

  /* ── Footer ── */
  #jobs-footer { display: flex; justify-content: space-between; align-items: center; padding: 14px 28px 28px; flex-wrap: wrap; gap: 12px; }
  #add-job-btn {
    background: var(--white); border: 1px dashed var(--border); color: var(--text3);
    font-size: 10px; padding: 9px 18px; border-radius: 5px; letter-spacing: 0.1em; text-transform: uppercase;
  }
  #add-job-btn:hover { border-color: var(--accent); color: var(--accent); }
  #delete-week-btn {
    background: none; border: 1px solid #e0c0c0; color: #c0362a;
    font-size: 10px; padding: 9px 16px; border-radius: 5px;
    letter-spacing: 0.1em; text-transform: uppercase; font-family: var(--font);
  }
  #grand-total-box {
    text-align: right; background: var(--white); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 20px; box-shadow: 0 2px 6px rgba(30,60,100,0.08);
  }
  #grand-total-label { font-size: 9px; color: var(--text3); letter-spacing: 0.12em; margin-bottom: 3px; text-transform: uppercase; }
  #grand-total-hours { font-family: var(--font-head); font-size: 22px; font-weight: 800; color: var(--accent); }
  #grand-total-pay { font-size: 14px; color: var(--text); font-weight: 600; margin-top: 2px; }

  /* ── Summary tab ── */
  #summary-wrap { padding: 24px 28px; }
  #summary-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
  .summary-card {
    background: var(--white); border-radius: 10px; padding: 16px 18px;
    border: 1px solid var(--border2); box-shadow: 0 2px 6px rgba(30,60,100,0.07);
    border-top-width: 3px;
  }
  .summary-name { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 10px; }
  .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .summary-lbl { font-size: 8px; color: var(--text3); letter-spacing: 0.1em; margin-bottom: 2px; text-transform: uppercase; }
  .summary-val { font-family: var(--font-head); font-size: 18px; font-weight: 700; }
  .summary-extra-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 4px 8px; background: var(--green-bg); border-radius: 4px;
    border: 1px solid var(--green-bd); margin-bottom: 6px;
  }
  .summary-extra-lbl { font-size: 9px; color: var(--green); font-weight: 600; letter-spacing: 0.05em; }
  .summary-extra-val { font-size: 11px; color: var(--green); font-weight: 700; }
  .summary-total-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 7px 10px; border-radius: 5px;
  }
  .summary-total-lbl { font-size: 9px; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; }
  .summary-total-val { font-family: var(--font-head); font-size: 16px; font-weight: 800; color: var(--text); }
  .summary-bars { display: flex; gap: 4px; margin-top: 10px; }
  .summary-bar { flex: 1; height: 4px; border-radius: 2px; background: var(--border2); }
  .summary-meta { font-size: 9px; color: var(--text3); margin-top: 5px; font-weight: 500; }
  #summary-footer {
    margin-top: 14px; display: flex; justify-content: flex-end; gap: 32px;
    background: var(--white); border: 1px solid var(--border2); border-radius: 10px;
    padding: 18px 24px; box-shadow: 0 2px 6px rgba(30,60,100,0.07);
  }
  .sf-label { font-size: 9px; color: var(--text3); letter-spacing: 0.1em; margin-bottom: 3px; text-transform: uppercase; }
  .sf-hours { font-family: var(--font-head); font-size: 28px; color: var(--accent); font-weight: 800; }
  .sf-pay   { font-family: var(--font-head); font-size: 28px; color: var(--text); font-weight: 800; }

  /* ── Confirm modal ── */
  #confirm-modal {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(15,26,32,0.45); backdrop-filter: blur(3px);
    align-items: center; justify-content: center;
  }
  #confirm-modal.open { display: flex; }
  #confirm-box {
    background: var(--white); border-radius: 12px; padding: 26px 28px;
    width: 90%; max-width: 380px; box-shadow: 0 8px 32px rgba(15,26,32,0.2);
    border: 1px solid var(--border);
  }
  #confirm-box h2 { font-family: var(--font-head); font-size: 16px; font-weight: 800; color: var(--text); margin-bottom: 8px; }
  #confirm-box p  { font-size: 11px; color: var(--text3); margin-bottom: 20px; line-height: 1.6; }
  #confirm-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .confirm-btn { padding: 8px 18px; border-radius: 5px; font-family: var(--font); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
  .confirm-cancel { background: var(--surface); border: 1px solid var(--border2); color: var(--text2); }
  .confirm-ok { background: var(--accent); border: 1px solid var(--accent); color: #fff; }
  .confirm-ok:hover { background: var(--accent2); }
  .confirm-danger { background: #c0362a !important; border-color: #c0362a !important; color: #fff; }
  .confirm-danger:hover { background: #a02020 !important; }

  /* ── Share modal ── */
  #share-modal {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(15,26,32,0.45); backdrop-filter: blur(3px);
    align-items: center; justify-content: center;
  }
  #share-modal.open { display: flex; }
  #share-box {
    background: var(--white); border-radius: 12px; padding: 24px 26px;
    width: 90%; max-width: 540px; box-shadow: 0 8px 32px rgba(15,26,32,0.2);
    border: 1px solid var(--border);
  }
  #share-box h2 { font-family: var(--font-head); font-size: 16px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
  #share-box p  { font-size: 10px; color: var(--text3); margin-bottom: 14px; }
  #share-textarea {
    width: 100%; height: 280px; border: 1px solid var(--border2); border-radius: 7px;
    padding: 12px 14px; font-family: var(--font); font-size: 11px; color: var(--text);
    background: var(--surface); resize: none; outline: none; line-height: 1.7;
  }
  #share-actions { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; }
  .share-btn-style {
    padding: 8px 18px; border-radius: 5px; font-family: var(--font); font-size: 10px;
    letter-spacing: 0.08em; text-transform: uppercase; border: 1px solid var(--border2);
    background: var(--surface); color: var(--text2); cursor: pointer; transition: all 0.15s;
  }
  .share-btn-style.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .share-btn-style.success { background: var(--green); border-color: var(--green); color: #fff; }

  /* ── Save badge ── */
  #save-badge {
    position: fixed; bottom: 18px; right: 18px;
    background: var(--green); color: #fff; font-size: 10px; padding: 7px 14px;
    border-radius: 20px; opacity: 0; transition: opacity 0.3s;
    pointer-events: none; letter-spacing: 0.07em; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  #save-badge.show { opacity: 1; }

  /* ── Toolbar buttons ── */
  .tool-btn {
    background: var(--white); border: 1px solid var(--border); color: var(--text2);
    font-size: 10px; padding: 9px 18px; border-radius: 5px;
    letter-spacing: 0.1em; text-transform: uppercase; font-family: var(--font); transition: all 0.15s;
  }
  .tool-btn:hover { border-color: var(--accent); color: var(--accent); }
  #share-btn { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 2px 6px rgba(46,109,164,0.25); }
  #share-btn:hover { background: var(--accent2); }



  /* ── Worker name autocomplete ── */
  .worker-name-wrap { position: relative; flex: 1; }
  .worker-suggestions {
    position: absolute; top: 100%; left: 0; right: 0; z-index: 100;
    background: var(--white); border: 1px solid var(--border);
    border-radius: 5px; box-shadow: 0 4px 12px rgba(30,60,100,0.12);
    max-height: 120px; overflow-y: auto; display: none;
  }
  .worker-suggestions.open { display: block; }
  .worker-suggestion-item {
    padding: 5px 8px; font-size: 10px; cursor: pointer;
    color: var(--text); font-family: var(--font);
  }
  .worker-suggestion-item:hover { background: var(--surface); color: var(--accent); }


  /* ── Last saved timestamp ── */
  #last-saved {
    font-size: 9px; color: var(--text3); letter-spacing: 0.06em;
    font-family: var(--font); white-space: nowrap;
  }
  #last-saved.saving { color: var(--accent); animation: pulse 1.2s ease-in-out infinite; }
  #last-saved.saved  { color: var(--text3); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }


  /* ── Backup button ── */
  #backup-btn {
    background: none; border: 1px solid rgba(46,109,164,0.3); color: var(--text3);
    font-size: 9px; padding: 6px 12px; border-radius: 5px; cursor: pointer;
    font-family: var(--font); letter-spacing: 0.08em; text-transform: uppercase;
    transition: all 0.15s;
  }
  #backup-btn:hover { border-color: var(--accent); color: var(--accent); }
  #backup-btn.saving { border-color: var(--green); color: var(--green); }

  /* ── Read Only Mode ── */
  body.read-only input, body.read-only button:not(#read-only-badge) { pointer-events: none !important; opacity: 0.8; }
  body.read-only .add-worker-btn, body.read-only .del-worker-btn,
  body.read-only #add-job-btn, body.read-only #delete-week-btn,
  body.read-only #add-person-btn, body.read-only #share-btn { display: none !important; }
  #read-only-badge {
    position: fixed; top: 0; left: 0; right: 0; z-index: 999;
    background: #2e6da4; color: #fff; text-align: center;
    font-size: 11px; padding: 6px; letter-spacing: 0.1em;
    font-family: 'JetBrains Mono', monospace; text-transform: uppercase;
    display: none;
  }
  body.read-only #read-only-badge { display: block; }
  body.read-only #header { margin-top: 32px; }



  /* ── PAID stamp ── */
  #paid-stamp-overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none; display: none; z-index: 10;
  }
  #paid-stamp-overlay.visible { display: block; }
  #paid-stamp-text {
    position: absolute; top: 40%; left: 50%; transform: translate(-50%,-50%) rotate(-30deg);
    font-family: var(--font-head); font-size: 80px; font-weight: 900;
    color: rgba(42,122,86,0.18); border: 8px solid rgba(42,122,86,0.18);
    padding: 10px 30px; border-radius: 8px; letter-spacing: 0.1em;
    white-space: nowrap; user-select: none;
  }
  #paid-stamp-btn {
    background: var(--green); border: none; color: #fff;
    font-size: 10px; padding: 9px 20px; border-radius: 5px;
    letter-spacing: 0.1em; text-transform: uppercase; font-family: var(--font);
    cursor: pointer; margin-bottom: 8px; margin-left: 8px;
  }
  #paid-stamp-btn.stamped { background: #c0362a; }

  /* ── Invoice ── */
  #tab-invoice { display: none; }
  #tab-invoice.active { display: block; }
  #invoice-wrap {
    padding: 20px 28px;
    max-width: 900px;
    margin: 0 auto;
  }
  #invoice-body {
    background: #fff;
    border-radius: 10px;
    padding: 36px 40px;
    box-shadow: 0 2px 8px rgba(30,60,100,0.09);
    font-family: var(--font);
  }
  .inv-logo { font-family: var(--font-head); font-size: 28px; font-weight: 800; color: #1a3a6a; margin-bottom: 6px; }
  .inv-meta { font-size: 11px; color: var(--text2); line-height: 1.8; margin-bottom: 20px; }
  .inv-meta strong { color: var(--text); }
  .inv-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 11px; }
  .inv-table thead tr { background: #1a3a6a; color: #fff; }
  .inv-table thead th { padding: 9px 12px; text-align: left; font-weight: 600; letter-spacing: 0.06em; font-size: 10px; }
  .inv-table thead th:not(:first-child) { text-align: right; }
  .inv-table .day-header td { background: #e8eef8; color: #1a3a6a; font-weight: 700; font-size: 11px; padding: 7px 12px; border-top: 1px solid #c8d4e8; }
  .inv-table .job-row td { padding: 6px 12px; border-bottom: 1px solid #f0f4f8; color: var(--text2); }
  .inv-table .job-row td:not(:first-child) { text-align: right; }
  .inv-table .job-row:hover td { background: #f8fafc; }
  .inv-table .nil-row td { padding: 6px 12px; color: #aaa; font-style: italic; border-bottom: 1px solid #f0f4f8; }
  .inv-table .grand-row td { background: #1a3a6a; color: #fff; font-weight: 700; padding: 10px 12px; font-size: 11px; }
  .inv-table .grand-row td:not(:first-child) { text-align: right; }

  input { pointer-events: none !important; user-select: none !important; -webkit-user-select: none !important; }

<div id="header">
  <div style="display:flex;flex-direction:column;gap:6px;">

      <span style="font-size:10px;color:var(--text3);">$</span>
      <input id="global-rate" type="number" min="0" step="1" value="40"
        oninput="setGlobalRate(this.value)"
        style="font-size:13px;font-weight:700;color:var(--accent);width:44px;border-bottom:1px solid var(--border2);outline:none;background:transparent;font-family:var(--font);">
      <span style="font-size:10px;color:var(--text3);">/hr — all jobs</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <button onclick="changeWeek(-1)" title="Previous week" style="background:var(--surface);border:1px solid var(--border2);color:var(--text2);width:24px;height:24px;border-radius:4px;font-size:12px;display:flex;align-items:center;justify-content:center;">&#8592;</button>
      <div id="week-label"></div>

    </div>

<div id="save-badge">✓ Saved</div>

<script>
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const COLORS = ['#2e6da4','#c0622a','#27875a','#a03070','#6b3ab5','#b56020','#1a6a8e','#c0362a'];

// ── State ──
// Each cell "rowId|day" is fully independent: own jobName, own workers, own parking/materials
// G.rows = list of row IDs (just for ordering)
let G = { rows:[1,2], nextRow:3, globalRate:40, currentOffset:0 };
let cells = {};
// cells["1|Mon"] = { jobName:'', workers:[{name,from,to},...], parking:'', materials:'' }

function ck(rid, day) { return rid+'|'+day; }

function getCell(rid, day) {
  const k = ck(rid,day);
  if (!cells[k]) cells[k] = {jobName:'', workers:[], parking:'', materials:''};
  return cells[k];
}

function newWorker() { return {name:'', from:'', to:''}; }

// ── Storage ──
function weekKey(offset) {
  const now=new Date(), d=now.getDay();
  const mon=new Date(now); mon.setDate(now.getDate()-d+(d===0?-6:1)+(offset||0)*7);
  const yr=mon.getFullYear();
  const wn=Math.ceil(((mon-new Date(yr,0,1))/86400000+new Date(yr,0,1).getDay()+1)/7);
  return yr+'-W'+String(wn).padStart(2,'0');
}

let saveTimer;
function scheduleSave_local() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    try {
      localStorage.setItem('jt2_global', JSON.stringify(G));
      localStorage.setItem('jt2_wk_'+weekKey(G.currentOffset), JSON.stringify(cells));
      const b=document.getElementById('save-badge');
      b.classList.add('show'); setTimeout(()=>b.classList.remove('show'),1200);
    } catch(e){}
  }, 800);
}

function loadState() {
  try { const s=localStorage.getItem('jt2_global'); if(s) G=JSON.parse(s); } catch(e){}
  loadWeek();
}
function loadWeek() {
  try {
    const s=localStorage.getItem('jt2_wk_'+weekKey(G.currentOffset));
    cells = s ? JSON.parse(s) : {};
  } catch(e) { cells={}; }
}

// ── Time helpers ──
function parseTime(raw) {
  if(!raw) return null;
  raw=raw.trim().toLowerCase().replace(/\s+/g,'');
  if(!raw) return null;
  if(/^\d{1,2}:\d{2}$/.test(raw)){const[h,m]=raw.split(':').map(Number);return(h<=23&&m<=59)?pad(h)+':'+pad(m):null;}
  let h,m=0,pm=false,am=false;
  if(raw.endsWith('pm')){pm=true;raw=raw.slice(0,-2);}else if(raw.endsWith('am')){am=true;raw=raw.slice(0,-2);}
  if(raw.includes('.')){const p=raw.split('.');h=parseInt(p[0]);m=parseInt(p[1].padEnd(2,'0').slice(0,2));}
  else if(raw.length<=2){h=parseInt(raw);m=0;}
  else if(raw.length===3){h=parseInt(raw[0]);m=parseInt(raw.slice(1));}
  else if(raw.length===4){h=parseInt(raw.slice(0,2));m=parseInt(raw.slice(2));}
  else return null;
  if(isNaN(h)||isNaN(m)||m>59) return null;
  if(pm&&h!==12) h+=12; if(am&&h===12) h=0; if(!pm&&!am&&h<6) h+=12;
  if(h>23) return null;
  return pad(h)+':'+pad(m);
}
function pad(n){return n<10?'0'+n:''+n;}
function toDisp(hhmm){if(!hhmm)return'';const[h,m]=hhmm.split(':').map(Number);return(h%12||12)+(m>0?'.'+pad(m):'')+(h<12?'am':'pm');}
function calcH(from,to){if(!from||!to)return 0;const[fh,fm]=from.split(':').map(Number),[th,tm]=to.split(':').map(Number);let mins=(th*60+tm)-(fh*60+fm);if(mins<0)mins+=1440;return parseFloat((mins/60).toFixed(2));}
function fmt(h){if(!h||h<=0)return null;const hh=Math.floor(h),mm=Math.round((h-hh)*60);return mm===0?hh+'h':hh+'h '+mm+'m';}

// ── Calculations ──
function cellHrs(rid,day){return(cells[ck(rid,day)]?.workers||[]).reduce((s,w)=>s+calcH(w.from,w.to),0);}
function cellExtras(rid,day){const c=cells[ck(rid,day)];if(!c)return 0;return(parseFloat(c.parking)||0)+(parseFloat(c.materials)||0);}
function rowHrs(rid){return DAYS.reduce((s,d)=>s+cellHrs(rid,d),0);}
function rowWages(rid){return rowHrs(rid)*(G.globalRate||40);}
function rowExtras(rid){return DAYS.reduce((s,d)=>s+cellExtras(rid,d),0);}
function rowGrand(rid){return rowWages(rid)+rowExtras(rid);}
function dayTotalHrs(day){return G.rows.reduce((s,rid)=>s+cellHrs(rid,day),0);}
function allHrs(){return G.rows.reduce((s,rid)=>s+rowHrs(rid),0);}
function allPay(){return G.rows.reduce((s,rid)=>s+rowGrand(rid),0);}

// ── Week nav ──
function weekDates(offset){
  const now=new Date(),d=now.getDay();
  const mon=new Date(now); mon.setDate(now.getDate()-d+(d===0?-6:1)+(offset||0)*7);
  const sun=new Date(mon); sun.setDate(mon.getDate()+6);
  return{mon,sun};
}
function dayDates(offset){
  const{mon}=weekDates(offset);
  return DAYS.map((_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d.toLocaleDateString('en-AU',{day:'numeric',month:'numeric',year:'2-digit'});});
}
function updateWeekLabel(){
  const{mon,sun}=weekDates(G.currentOffset);
  const f=d=>d.toLocaleDateString('en-AU',{day:'numeric',month:'short'});
  const dot=localStorage.getItem('jt2_wk_'+weekKey(G.currentOffset))?'  ●':'';
  document.getElementById('week-label').textContent='Week of '+f(mon)+' – '+f(sun)+dot;
}
async function changeWeek(dir){
  clearTimeout(saveTimer);
  G.currentOffset += dir;
  // Never save currentOffset to sheet — it's always calculated from today
  // Show loading indicator
  const wl = document.getElementById('week-label');
  if(wl) wl.textContent = 'Loading...';
  if(USE_CLOUD){
    const wk=await cloudGet('jt2_wk_'+weekKey(G.currentOffset));
    if(wk){try{cells=JSON.parse(wk);}catch(e){cells={};}}
    else{cells={};}
  } else {
    loadWeek();
  }
  await loadLastEditTime();
  updateWeekLabel();
  render();
}

let _ca=null;
function confirmNextWeek(){_ca='next';document.getElementById('confirm-title').textContent='Go to next week?';document.getElementById('confirm-msg').textContent='Current week is saved. Use ← to come back anytime.';document.getElementById('confirm-ok-btn').textContent='Next Week';document.getElementById('confirm-ok-btn').className='confirm-btn confirm-ok';document.getElementById('confirm-modal').classList.add('open');}
function confirmDeleteWeek(){_ca='delete';document.getElementById('confirm-title').textContent='Delete this week?';document.getElementById('confirm-msg').textContent='Permanently deletes all data for this week.';document.getElementById('confirm-ok-btn').textContent='Delete Week';document.getElementById('confirm-ok-btn').className='confirm-btn confirm-danger';document.getElementById('confirm-modal').classList.add('open');}
function closeConfirm(){document.getElementById('confirm-modal').classList.remove('open');_ca=null;}
function doConfirm(){
  closeConfirm();
  if(_ca==='next'){changeWeek(1);}
  else if(_ca==='delete'){localStorage.removeItem('jt2_wk_'+weekKey(G.currentOffset));cells={};render();updateWeekLabel();}
}

// ── Render ──
function render(){renderHead();renderBody();renderFooter();}

function renderHead(){
  const dates=dayDates(G.currentOffset);
  let h=`<tr><th style="width:0;padding:0;border:none;"></th>`;
  DAYS.forEach((d,i)=>{
    const dt=dayTotalHrs(d);
    h+=`<th><div class="th-day-total${dt>0?' has-hours':''}">${dt>0?(fmt(dt)||'–'):'–'}</div><div style="font-size:10px;font-weight:700;letter-spacing:0.08em;">${d.toUpperCase()}</div><div style="font-size:9px;color:var(--text3);font-weight:400;margin-top:1px;">${dates[i]}</div></th>`;
  });
  h+=`</tr>`;
  document.getElementById('jobs-head').innerHTML=h;
}

function renderBody(){
  const rowColors = COLORS;
  let h='';
  G.rows.forEach((rid,ri)=>{
    const color = rowColors[ri % rowColors.length];
    const th=rowHrs(rid), tw=rowWages(rid), te=rowExtras(rid), gt=rowGrand(rid);
    h+=`<tr class="job-row"><td style="width:0;padding:0;border:none;"></td>`;

    DAYS.forEach(day=>{
      const k=ck(rid,day);
      // Read cell — each key is unique so no sharing possible
      const c = cells[k] || {jobName:'', workers:[], parking:'', materials:''};
      const workers = c.workers || [];
      const dh = cellHrs(rid,day);
      const hasData = c.jobName || workers.some(w=>w.name||w.from||w.to) || c.parking || c.materials;

      h+=`<td class="day-cell">
        <div class="day-inner${hasData?' has-data':''}">
          <div style="display:flex;align-items:center;gap:5px;margin-bottom:5px;border-bottom:1px solid ${color}30;padding-bottom:5px;">
            <div style="width:3px;height:14px;border-radius:2px;background:${color};flex-shrink:0;"></div>
            <input placeholder="Job name" value="${esc(c.jobName||'')}"
              oninput="setCellJob(${rid},'${day}',this.value)"
              style="font-size:10px;font-weight:700;color:${color};letter-spacing:0.04em;text-transform:uppercase;border:none;outline:none;background:transparent;font-family:var(--font);flex:1;min-width:0;">
            ${day===DAYS[0]?`<button onclick="removeRow(${rid})" title="Remove row" style="background:none;border:none;color:var(--border);font-size:13px;padding:0 2px;line-height:1;cursor:pointer;flex-shrink:0;">×</button>`:''}
          </div>
          <div class="worker-list" id="wl_${rid}_${day}">`;

      workers.forEach((w,wi)=>{
        const wh=calcH(w.from,w.to);
        h+=`<div class="worker-entry">
            <div class="worker-name-row">
              <div class="worker-name-wrap">
                <input class="worker-name-inp" placeholder="Name" value="${esc(w.name||'')}"
                  data-wkey="${rid}_${day}_${wi}"
                  oninput="setW(${rid},'${day}',${wi},'name',this.value);showWorkerSuggestions(this,${rid},'${day}',${wi})"
                  onfocus="showWorkerSuggestions(this,${rid},'${day}',${wi})"
                  onblur="setTimeout(()=>this.closest('.worker-name-wrap')?.querySelector('.worker-suggestions')?.classList.remove('open'),200)">
                <div class="worker-suggestions"></div>
              </div>
              <span class="worker-hrs-badge${wh>0?' has-hrs':''}" id="whb_${rid}_${day}_${wi}">${wh>0?(fmt(wh)||''):'–'}</span>
              <button class="del-worker-btn" onclick="delWorker(${rid},'${day}',${wi})">×</button>
            </div>
            <div class="worker-times-row">
              <span class="wt-sym">▶</span>
              <input class="worker-time-inp${w.from?' filled':''}" style="width:54px" placeholder="9am" value="${toDisp(w.from)}"
                onblur="parseWT(this,${rid},'${day}',${wi},'from')"
                onkeydown="if(event.key==='Enter'||event.key==='Tab')parseWT(this,${rid},'${day}',${wi},'from')">
              <span class="wt-sym" style="margin:0 2px">–</span>
              <input class="worker-time-inp${w.to?' filled':''}" style="width:54px" placeholder="5pm" value="${toDisp(w.to)}"
                onblur="parseWT(this,${rid},'${day}',${wi},'to')"
                onkeydown="if(event.key==='Enter'||event.key==='Tab')parseWT(this,${rid},'${day}',${wi},'to')">
            </div>
          </div>`;
      });

      const park=c.parking||'', mats=c.materials||'';
      h+=`</div>
          <button class="add-worker-btn" onclick="addWorker(${rid},'${day}')">+ worker</button>
          <div class="cell-footer">
            <div class="cell-total-hrs" id="cdh_${rid}_${day}">${dh>0?(fmt(dh)||''):'&nbsp;'}</div>
            <div class="cell-extra-row">
              <span class="cell-extra-lbl">P</span><span class="cell-extra-sym">$</span>
              <input class="cell-extra-inp${park?' filled':''}" type="number" min="0" step="1" placeholder="park"
                value="${park}" oninput="setExtra(${rid},'${day}','parking',this.value)">
            </div>
            <div class="cell-extra-row">
              <span class="cell-extra-lbl">M</span><span class="cell-extra-sym">$</span>
              <input class="cell-extra-inp${mats?' filled':''}" type="number" min="0" step="1" placeholder="matl"
                value="${mats}" oninput="setExtra(${rid},'${day}','materials',this.value)">
            </div>
          </div>
        </div>
      </td>`;
    });

    h+=`</tr>`;
  });
  document.getElementById('jobs-body').innerHTML=h;
}

function renderFooter(){
  document.getElementById('grand-total-hours').textContent=fmt(allHrs())||'0h';
  document.getElementById('grand-total-pay').textContent='$'+allPay().toFixed(2);
}

function updateRowTotals(rid){ return; //
  const th=rowHrs(rid),tw=rowWages(rid),te=rowExtras(rid),gt=rowGrand(rid);
  const ri=G.rows.indexOf(rid);
  const color=COLORS[ri%COLORS.length];
  const eh=document.getElementById('trh_'+rid);if(eh){eh.textContent=fmt(th)||'–';}
  const ew=document.getElementById('trw_'+rid);if(ew)ew.textContent='$'+tw.toFixed(2);
  const ee=document.getElementById('tre_'+rid);if(ee){ee.textContent='+$'+te.toFixed(2)+' extras';ee.style.display=te>0?'block':'none';}
  const eg=document.getElementById('trg_'+rid);if(eg)eg.textContent='$'+gt.toFixed(2);
  renderHead();renderFooter();
}

// ── Actions ──

// Set job name for ONE specific cell only
function setCellJob(rid, day, value){
  const k=ck(rid,day);
  if(!cells[k]) cells[k]={jobName:'',workers:[],parking:'',materials:''};
  cells[k].jobName = value;
  cloudScheduleSave();
}

function setW(rid,day,wi,field,value){
  const k=ck(rid,day);
  if(!cells[k]) cells[k]={jobName:'',workers:[],parking:'',materials:''};
  if(!cells[k].workers[wi]) cells[k].workers[wi]=newWorker();
  cells[k].workers[wi][field]=value;
  const w=cells[k].workers[wi];
  const wh=calcH(w.from,w.to);
  const badge=document.getElementById('whb_'+rid+'_'+day+'_'+wi);
  if(badge){badge.textContent=wh>0?(fmt(wh)||''):'–';badge.className='worker-hrs-badge'+(wh>0?' has-hrs':'');}
  const dh=cellHrs(rid,day);
  const dEl=document.getElementById('cdh_'+rid+'_'+day);
  if(dEl)dEl.innerHTML=dh>0?(fmt(dh)||''):'&nbsp;';
  updateRowTotals(rid);
  // Update column header day total live
  renderHead();
  renderFooter();
  cloudScheduleSave();
}

function parseWT(inp,rid,day,wi,field){
  const raw=inp.value.trim();
  if(!raw){inp.value='';inp.classList.remove('filled','error');setW(rid,day,wi,field,'');return;}
  const p=parseTime(raw);
  if(p){inp.value=toDisp(p);inp.classList.add('filled');inp.classList.remove('error');setW(rid,day,wi,field,p);}
  else inp.classList.add('error');
}

function addWorker(rid,day){
  const k=ck(rid,day);
  if(!cells[k]) cells[k]={jobName:'',workers:[],parking:'',materials:''};
  cells[k].workers.push(newWorker());
  render();cloudScheduleSave();
}

function delWorker(rid,day,wi){
  const k=ck(rid,day);
  if(!cells[k]) return;
  cells[k].workers.splice(wi,1);
  render();cloudScheduleSave();
}

function setExtra(rid,day,field,value){
  const k=ck(rid,day);
  if(!cells[k]) cells[k]={jobName:'',workers:[],parking:'',materials:''};
  cells[k][field]=value;
  updateRowTotals(rid);cloudScheduleSave();
}

function addJob(){
  const rid=G.nextRow++;
  G.rows.push(rid);
  render();cloudScheduleSave();
}

function removeRow(rid){
  G.rows=G.rows.filter(r=>r!==rid);
  DAYS.forEach(d=>delete cells[ck(rid,d)]);
  render();cloudScheduleSave();
}

function setGlobalRate(value){
  G.globalRate=parseFloat(value)||0;
  G.rows.forEach(rid=>updateRowTotals(rid));
  renderFooter();cloudScheduleSave();
}

function buildText(){
  const{mon,sun}=weekDates(G.currentOffset);
  const f=d=>d.toLocaleDateString('en-AU',{day:'numeric',month:'short'});
  const lines=['JOBS — '+f(mon)+' to '+f(sun),'═'.repeat(38)];

  // Group by day first, then all jobs under each day
  DAYS.forEach((day,i)=>{
    const dayDate=dayDates(G.currentOffset)[i];
    const dayJobs=G.rows.filter(rid=>{
      const c=cells[ck(rid,day)];
      return c&&(c.jobName||c.workers?.length>0||c.parking||c.materials);
    });
    if(!dayJobs.length) return;

    lines.push('');
    lines.push(day.toUpperCase()+' '+dayDate);
    lines.push('─'.repeat(30));

    dayJobs.forEach(rid=>{
      const c=cells[ck(rid,day)];
      if(c.jobName) lines.push('  '+c.jobName.toUpperCase());
      (c.workers||[]).forEach(w=>{
        const wh=calcH(w.from,w.to);
        lines.push('    '+(w.name||'Worker')+': '+toDisp(w.from)+' – '+toDisp(w.to)+'  ('+(fmt(wh)||'–')+')');
      });
      const dh=cellHrs(rid,day);
      if(dh>0) lines.push('    Total: '+fmt(dh));
      if(parseFloat(c.parking)>0) lines.push('    Parking: $'+parseFloat(c.parking).toFixed(0));
      if(parseFloat(c.materials)>0) lines.push('    Materials: $'+parseFloat(c.materials).toFixed(0));
      lines.push(''); // gap between jobs
    });
  });

  lines.push('');lines.push('═'.repeat(38));
  lines.push('TOTAL HOURS: '+(fmt(allHrs())||'0h'));
  lines.push('TOTAL VALUE: $'+allPay().toFixed(2));
  return lines.join('\n');
}

// ── Invoice ──
function getInvoiceNumber() {
  // Base invoice 568 = week 2026-W13 (week of 23 Mar)
  // Each subsequent week adds 1
  const BASE_INV = 568;
  const BASE_WEEK = 13;
  const BASE_YEAR = 2026;
  const now = new Date(), d = now.getDay();
  const mon = new Date(now); mon.setDate(now.getDate()-d+(d===0?-6:1)+(G.currentOffset||0)*7);
  const yr = mon.getFullYear();
  const wn = Math.ceil(((mon-new Date(yr,0,1))/86400000+new Date(yr,0,1).getDay()+1)/7);
  const weeksDiff = (yr - BASE_YEAR)*52 + (wn - BASE_WEEK);
  return BASE_INV + weeksDiff;
}

function getWeekEndDate() {
  const now = new Date(), d = now.getDay();
  const mon = new Date(now); mon.setDate(now.getDate()-d+(d===0?-6:1)+(G.currentOffset||0)*7);
  const sun = new Date(mon); sun.setDate(mon.getDate()+6);
  const dd=String(sun.getDate()).padStart(2,'0'), mm=String(sun.getMonth()+1).padStart(2,'0'), yy=String(sun.getFullYear()); return dd+'/'+mm+'/'+yy;
}

function getPaymentDueDate() {
  const now = new Date(), d = now.getDay();
  const mon = new Date(now); mon.setDate(now.getDate()-d+(d===0?-6:1)+(G.currentOffset||0)*7);
  const sun = new Date(mon); sun.setDate(mon.getDate()+6);
  const due = new Date(sun); due.setDate(sun.getDate()+14);
  const dd=String(due.getDate()).padStart(2,'0'), mm=String(due.getMonth()+1).padStart(2,'0'), yy=String(due.getFullYear());
  return dd+'/'+mm+'/'+yy;
}

function togglePaidStamp() {
  const overlay = document.getElementById('paid-stamp-overlay');
  const btn = document.getElementById('paid-stamp-btn');
  if (!overlay) return;
  const isStamped = overlay.classList.contains('visible');
  if (isStamped) {
    overlay.classList.remove('visible');
    btn.textContent = '✓ Mark as PAID';
    btn.classList.remove('stamped');
  } else {
    overlay.classList.add('visible');
    btn.textContent = '✕ Remove PAID';
    btn.classList.add('stamped');
  }
}

const API_URL = 'https://script.google.com/macros/s/AKfycbyV8B4gewTmHsRUyi8J-gxpaMpcB_VlLX_16BpAQX5xmr2IlAGE1LfgN2uYX02OSaio/exec';

const USE_CLOUD = API_URL.length > 0;

async function cloudGet(key, withMeta=false) {
  if (!USE_CLOUD) return withMeta ? {value:null,updated:null} : null;
  try {
    const url = API_URL + '?action=get&key=' + encodeURIComponent(key);
    const r = await fetch(url, {redirect: 'follow'});
    const text = await r.text();
    const d = JSON.parse(text);
    const value = (d.ok && d.value !== null && d.value !== undefined) ? d.value : null;
    if (withMeta) return { value, updated: d.updated || null };
    return value;
  } catch(e) {
    return withMeta ? {value:null,updated:null} : null;
  }
}

async function cloudSet(key, value) {
  if (!USE_CLOUD) return;
  try {
    await fetch(API_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
      body: 'action=set&key=' + encodeURIComponent(key) + '&value=' + encodeURIComponent(value),
      redirect: 'follow'
    });
  } catch(e) { console.log('cloudSet error:', key, e); }
}

async function cloudLoadState() {
  if (!USE_CLOUD) {
    loadState(); updateWeekLabel(); render();
    const gr=document.getElementById('global-rate');
    if(gr&&G.globalRate)gr.value=G.globalRate;
    return;
  }
  try {
    // Load global config
    const g = await cloudGet('jt2_global');
    console.log('Loaded global:', g);
    if (g) {
      try { G = JSON.parse(g); } catch(e){ console.log('G parse error', e); }
    }

    // Load current week cells
    const wkKey = 'jt2_wk_' + weekKey(G.currentOffset);
    console.log('Loading week key:', wkKey);
    const wkResult = await cloudGet(wkKey, true);
    const wk = wkResult ? wkResult.value : null;
    const wkUpdated = wkResult ? wkResult.updated : null;
    console.log('Loaded week data:', wk ? wk.slice(0,100) : 'null');

    if (wk) {
      try {
        cells = JSON.parse(wk);
        console.log('Cells loaded, keys:', Object.keys(cells).length);
      } catch(e) {
        console.log('cells parse error', e);
        cells = {};
      }
    } else {
      cells = {};
    }
    // Always reset offset to 0 — never trust stored offset
    G.currentOffset = 0;
  } catch(e) {
    console.log('cloudLoadState error:', e);
  }

  updateWeekLabel();
  render();
  const gr = document.getElementById('global-rate');
  if (gr && G.globalRate) gr.value = G.globalRate;
  await loadLastEditTime();
  startPolling();
  startSavedTimer();
}

let _lastHash = '';
let _isSaving = false;
let _lastTyped = 0;
document.addEventListener('input', () => { _lastTyped = Date.now(); });
async function pollForChanges() {
  if (!USE_CLOUD || _isSaving) return;
  if (Date.now() - _lastTyped < 5000) return; // user is typing, skip
  try {
    const wk = await cloudGet('jt2_wk_' + weekKey(G.currentOffset));
    if (!wk || wk === _lastHash) return;
    const newCells = JSON.parse(wk);
    // Never overwrite with empty data
    const newKeys = Object.keys(newCells).length;
    const localKeys = Object.keys(cells).length;
    if (newKeys === 0 && localKeys > 0) {
      console.log('Poll skipped — remote is empty, local has data');
      return;
    }
    _lastHash = wk;
    const localStr = JSON.stringify(cells);
    const remoteStr = JSON.stringify(newCells);
    if (remoteStr !== localStr) {
      cells = newCells;
      render();
      updateSavedTimestamp();
    }
  } catch(e) {}
}

function startPolling() {
  setInterval(pollForChanges, 15000);
}

async function cloudScheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    const el=document.getElementById('last-saved'); if(el){el.textContent='Saving…';el.className='saving';}
    if (USE_CLOUD) {
      _isSaving = true;
      // Never save currentOffset — always calculate from today's date
      const gToSave = { rows: G.rows, nextRow: G.nextRow, globalRate: G.globalRate, currentOffset: 0 };
      await cloudSet('jt2_global', JSON.stringify(gToSave));
      const wkKey = 'jt2_wk_' + weekKey(G.currentOffset);
      const val = JSON.stringify(cells);
      // Never save empty data over existing data
      if (Object.keys(cells).length === 0 && _lastHash && _lastHash !== '{}' && _lastHash !== '') {
        console.log('Save skipped — cells empty but sheet has data');
        _isSaving = false;
        return;
      }
      await cloudSet(wkKey, val);
      _lastHash = val;
      _isSaving = false;
      await saveLastEditTime();
    } else {
      try {
        localStorage.setItem('jt2_global', JSON.stringify(G));
        localStorage.setItem('jt2_wk_' + weekKey(G.currentOffset), JSON.stringify(cells));
      } catch(e) {}
      updateSavedTimestamp();
    }
    const b = document.getElementById('save-badge');
    b.classList.add('show');
    setTimeout(() => b.classList.remove('show'), 1200);
  }, 800);
}

let _lastSavedTime = null;
// ── Manual Backup ──
async function manualBackup() {
  const btn = document.getElementById('backup-btn');
  if (!btn) return;
  btn.textContent = '💾 Saving...';
  btn.classList.add('saving');
  btn.disabled = true;
  try {
    const now = new Date();
    const dd = String(now.getDate()).padStart(2,'0');
    const mm = String(now.getMonth()+1).padStart(2,'0');
    const yy = now.getFullYear();
    const hh = String(now.getHours()).padStart(2,'0');
    const min = String(now.getMinutes()).padStart(2,'0');
    const backupName = `Backup_${dd}_${mm}_${yy}_${hh}${min}`;
    await cloudSet('manual_backup_trigger', backupName);
    setTimeout(() => {
      btn.textContent = '✓ Backed Up';
      setTimeout(() => {
        btn.textContent = '💾 Backup Now';
        btn.classList.remove('saving');
        btn.disabled = false;
      }, 2000);
    }, 1000);
  } catch(e) {
    btn.textContent = '💾 Backup Now';
    btn.classList.remove('saving');
    btn.disabled = false;
  }
}

const LAST_EDIT_KEY = 'jt2_last_edit';

async function saveLastEditTime() {
  const now = new Date().toISOString();
  await cloudSet(LAST_EDIT_KEY, now);
  updateSavedTimestamp(now);
}

async function loadLastEditTime() {
  try {
    const t = await cloudGet(LAST_EDIT_KEY);

}

function updateSavedTimestamp(isoString) {
  const t = isoString ? new Date(isoString) : new Date();
  _lastSavedTime = t;
  const el = document.getElementById('last-saved');
  if (!el) return;
  const hh = String(t.getHours()).padStart(2,'0');
  const mm = String(t.getMinutes()).padStart(2,'0');
  const day = t.getDate();
  const mon = t.toLocaleDateString('en-AU',{month:'short'});
  el.textContent = 'Last edit: ' + hh + ':' + mm + ' – ' + day + ' ' + mon;
  el.className = 'saved';
}

// ── Worker name autocomplete ──
function getKnownWorkers() {
  const names = new Set();
  // Collect from all current cells
  Object.values(cells).forEach(c => {
    (c.workers||[]).forEach(w => { if(w.name && w.name.trim()) names.add(w.name.trim()); });
  });
  // Also collect from localStorage for all weeks
  Object.keys(localStorage).forEach(k => {
    if (k.startsWith('jt2_wk_')) {
      try {
        const wk = JSON.parse(localStorage.getItem(k));
        Object.values(wk||{}).forEach(c => {
          (c.workers||[]).forEach(w => { if(w.name && w.name.trim()) names.add(w.name.trim()); });
        });
      } catch(e) {}
    }
  });
  return Array.from(names).sort();
}

function showWorkerSuggestions(inp, rid, day, wi) {
  const val = inp.value.trim().toLowerCase();
  const wrap = inp.closest('.worker-name-wrap');
  if (!wrap) return;
  let box = wrap.querySelector('.worker-suggestions');
  if (!box) {
    box = document.createElement('div');
    box.className = 'worker-suggestions';
    wrap.appendChild(box);
  }
  if (!val) { box.classList.remove('open'); return; }
  const matches = getKnownWorkers().filter(n => n.toLowerCase().startsWith(val) && n.toLowerCase() !== val);
  if (!matches.length) { box.classList.remove('open'); return; }
  box.innerHTML = matches.map(n =>
    `<div class="worker-suggestion-item" onmousedown="pickWorker(event,'${n}',${rid},'${day}',${wi})">${n}</div>`
  ).join('');
  box.classList.add('open');
}

function pickWorker(e, name, rid, day, wi) {
  e.preventDefault();
  const inp = document.querySelector(`input[data-wkey="${rid}_${day}_${wi}"]`);
  if (inp) {
    inp.value = name;
    inp.closest('.worker-name-wrap')?.querySelector('.worker-suggestions')?.classList.remove('open');
    setW(rid, day, wi, 'name', name);
  }
}

document.addEventListener('click', () => {
  document.querySelectorAll('.worker-suggestions.open').forEach(b => b.classList.remove('open'));
});
